<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1&family=Josefin+Sans&display=swap"
      rel="stylesheet"
    />
    <link href="css/index.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/header.css" />
    <link
      rel="stylesheet"
      href="js/splide/dist/css/themes/splide-default.min.css"
    />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <title>Piscinas Municipales de Villaverde de Íscar</title>
  </head>
  <body>
    <header id="header">
      <nav class="navbar" id="navbar">
        <span class="navbar-toggle" id="js-navbar-toggle">
          <i class="fas fa-bars"></i>
        </span>
        <a href="#" class="logo">logo</a>
        <ul class="main-nav" id="js-menu">
          <li>
            <a href="#home" class="nav-links">INICIO</a>
          </li>
          <li>
            <a href="#instalaciones" class="nav-links">INSTALACIONES</a>
          </li>
          <li>
            <a href="#bar" class="nav-links">BAR</a>
          </li>
          <li>
            <a href="#" class="nav-links">DÓNDE ESTAMOS</a>
          </li>
          <li>
            <a href="#" class="nav-links">CONTACTO</a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="inicio">
        <a name="home"></a>
        <div id="background-cover">
          <div id="logo"><img src="images/logo.png" alt="logo" /></div>
          <div class="arrow-home">
            <a href="#instalaciones"><i class="fas fa-chevron-down"></i></a>
          </div>
        </div>
      </div>

      <div class="instalaciones">
        <a name="instalaciones"></a>
        <div class="sliderInstalaciones-container">
          <div data-aos="fade-up-right" class="sliderInstalaciones fade">
            <img src="images/instalaciones1.JPG" alt="" style="width: 100%" />
          </div>
          <div class="sliderInstalaciones fade">
            <img src="images/instalaciones2.JPG" alt="" style="width: 100%" />
          </div>
          <div class="sliderInstalaciones fade">
            <img src="images/instalaciones3.JPG" alt="" style="width: 100%" />
          </div>
          <div class="sliderInstalaciones fade">
            <img src="images/instalaciones4.JPG" alt="" style="width: 100%" />
          </div>

          <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
          <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>

        <i class="fas fa-swimmer"></i>
        <div class="arrow-home">
          <a href="#bar"><i class="fas fa-chevron-down"></i></a>
        </div>
      </div>

      <div class="bar" data-aos="fade-right" data-aos-mirror="true">
        <a name="bar"></a>
        <div class="bar-buttons">
          <a class="button" href="carta.html">
            <span>CARTA</span>
          </a>
          <a class="button" href="carta.html">
            <span>CARTA DE POSTRES</span>
          </a>
        </div>
      </div>

      <div class="splide">
        <div class="splide__track">
          <ul class="splide__list">
            <li class="splide__slide">
              <img src="images/instalaciones1.JPG" alt="" />
            </li>
            <li class="splide__slide">
              <img src="images/instalaciones2.JPG" alt="" />
            </li>
            <li class="splide__slide">
              <img src="images/instalaciones3.JPG" alt="" />
            </li>
            <li class="splide__slide">
              <img src="images/instalaciones4.JPG" alt="" />
            </li>
          </ul>
        </div>
        <div class="splide__progress">
          <div class="splide__progress__bar"></div>
        </div>
      </div>
    </main>

    <script
      src="https://kit.fontawesome.com/790908a15c.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/index.js"></script>
    <script src="js/splide/dist/js/splide.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 800 });
    </script>
  </body>
</html>
